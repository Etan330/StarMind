<!doctype html>
<html lang="{{ 'en' if ui_lang == 'en' else 'zh-CN' }}">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{ title or "StarMind" }}</title>
    <link rel="stylesheet" href="/static/css/v3-design-system.css">
  </head>
  <body>
    <div class="app-shell">
      <header class="top-nav">
        <a class="brand" href="/" aria-label="StarMind 首页">
          <span class="brand-mark" aria-hidden="true">S</span>
          <span class="brand-word">StarMind</span>
        </a>
        <nav class="nav" aria-label="Primary navigation">
          <a class="{{ 'active' if active == 'home' else '' }}" href="/">首页</a>
          <a class="{{ 'active' if active == 'sync' else '' }}" href="/ui/sync">同步收藏</a>
          <a class="{{ 'active' if active == 'sources' else '' }}" href="/ui/sources">原始资料</a>
          <a class="{{ 'active' if active == 'wiki' else '' }}" href="/ui/wiki">知识库</a>
          <a class="{{ 'active' if active == 'history' else '' }}" href="/ui/history">历史</a>
          <a class="{{ 'active' if active == 'recycle' else '' }}" href="/ui/recycle">回收站</a>
          <a class="{{ 'active' if active == 'settings' else '' }}" href="/ui/settings">设置</a>
        </nav>
        <div class="top-nav-actions">
          <span class="local-pill"><span class="status-dot"></span>本地优先 · 数据只在你的设备</span>
          <a class="help-link" href="/ui/guide">帮助</a>
        </div>
      </header>

      <main class="content-shell">
        <section class="page-surface">
          {% block content %}{% endblock %}
        </section>
      </main>
    </div>

    <nav class="mobile-bottom-nav" aria-label="Primary mobile navigation">
      <a class="{{ 'active' if active == 'home' else '' }}" href="/">首页</a>
      <a class="{{ 'active' if active == 'sync' else '' }}" href="/ui/sync">同步</a>
      <a class="{{ 'active' if active == 'wiki' else '' }}" href="/ui/wiki">知识库</a>
      <a class="{{ 'active' if active == 'recycle' else '' }}" href="/ui/recycle">回收站</a>
      <a class="{{ 'active' if active == 'settings' else '' }}" href="/ui/settings">设置</a>
    </nav>
    {% block scripts %}{% endblock %}
    <script src="/static/app.js"></script>
  </body>
</html>
