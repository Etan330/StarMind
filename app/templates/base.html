<!doctype html>
<html lang="{{ 'en' if ui_lang == 'en' else 'zh-CN' }}">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{ title or "StarMind" }}</title>
    <link rel="stylesheet" href="/static/css/v3-design-system.css">
  </head>
  <body>
    <div class="app-shell">
      <header class="top-nav">
        <a class="brand" href="/" aria-label="StarMind 首页">
          <svg class="brand-logo" width="28" height="28" viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg">
            <circle cx="16" cy="16" r="14" fill="#215f52"/>
            <path d="M16 6 L18.5 12.5 L25 13 L20 17.5 L21.5 24 L16 20.5 L10.5 24 L12 17.5 L7 13 L13.5 12.5 Z" fill="#fff"/>
            <circle cx="16" cy="15" r="3" fill="#215f52"/>
            <circle cx="10" cy="12" r="1.2" fill="#8fd4c0"/>
            <circle cx="22" cy="12" r="1.2" fill="#8fd4c0"/>
            <circle cx="12" cy="21" r="1" fill="#8fd4c0"/>
            <circle cx="20" cy="20" r="1" fill="#8fd4c0"/>
            <line x1="16" y1="15" x2="10" y2="12" stroke="#8fd4c0" stroke-width="0.5"/>
            <line x1="16" y1="15" x2="22" y2="12" stroke="#8fd4c0" stroke-width="0.5"/>
            <line x1="16" y1="15" x2="12" y2="21" stroke="#8fd4c0" stroke-width="0.5"/>
            <line x1="16" y1="15" x2="20" y2="20" stroke="#8fd4c0" stroke-width="0.5"/>
          </svg>
          <span class="brand-word">StarMind</span>
        </a>
        <nav class="nav" aria-label="Primary navigation">
          <a class="{{ 'active' if active == 'home' else '' }}" href="/">首页</a>
          <a class="{{ 'active' if active == 'sync' else '' }}" href="/ui/sync">同步收藏</a>
          <a class="{{ 'active' if active == 'sources' else '' }}" href="/ui/sources">原始资料</a>
          <a class="{{ 'active' if active == 'wiki' else '' }}" href="/ui/wiki">知识库</a>
          <a class="{{ 'active' if active == 'push' else '' }}" href="/ui/push-settings">推送</a>
          <a class="{{ 'active' if active == 'history' else '' }}" href="/ui/history">历史</a>
          <a class="{{ 'active' if active == 'recycle' else '' }}" href="/ui/recycle">回收站</a>
          <a class="{{ 'active' if active == 'settings' else '' }}" href="/ui/settings">设置</a>
        </nav>
        <div class="top-nav-actions">
          <button id="restart-tour-btn" class="help-link tour-help-link" type="button">教程</button>
          <a class="help-link" href="/ui/guide">帮助</a>
        </div>
      </header>

      <main class="content-shell">
        <section class="page-surface">
          {% block content %}{% endblock %}
        </section>
      </main>
    </div>

    <nav class="mobile-bottom-nav" aria-label="Primary mobile navigation">
      <a class="{{ 'active' if active == 'home' else '' }}" href="/">首页</a>
      <a class="{{ 'active' if active == 'sync' else '' }}" href="/ui/sync">同步</a>
      <a class="{{ 'active' if active == 'sources' else '' }}" href="/ui/sources">资料</a>
      <a class="{{ 'active' if active == 'wiki' else '' }}" href="/ui/wiki">知识库</a>
      <a class="{{ 'active' if active == 'push' else '' }}" href="/ui/push-settings">推送</a>
      <a class="{{ 'active' if active == 'settings' else '' }}" href="/ui/settings">设置</a>
    </nav>
    <script src="/static/app.js"></script>
    {% block scripts %}{% endblock %}
    <script src="/static/time-picker.js?v=3"></script>
  </body>
</html>
