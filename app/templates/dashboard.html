{% extends "base.html" %}
{% import "_components.html" as ui %}
{% set title = "StarMind 首页" %}

{% block content %}
<div class="home-container" id="home-container">
  <!-- 知识图谱：全屏铺满，鼠标移入时收缩到左侧（无边框） -->
  <div id="home-graph" class="home-graph-bg"></div>
  <div id="graph-empty-hint" class="graph-empty-hint" style="display:none;">
    <div class="empty-dot"></div>
    <span>知识图谱（添加内容后显示）</span>
    <a href="/ui/sync" class="empty-guide-btn">开始第一步：同步你的收藏夹 →</a>
  </div>

  <!-- 右侧浮动面板 -->
  <div class="home-floating-panel" id="home-panel">
    <div class="home-entries">
      <button onclick="document.getElementById('modal-sync').showModal()" class="entry-chip">📂 同步收藏</button>
      <button onclick="document.getElementById('modal-link').showModal()" class="entry-chip">🔗 粘贴链接</button>
      <button onclick="document.getElementById('modal-creator').showModal()" class="entry-chip">👤 输入博主</button>
      <button onclick="document.getElementById('modal-idea').showModal()" class="entry-chip">💡 写想法</button>
    </div>
    <div class="home-chat">
      <!-- 历史对话列表 -->
      <div id="chat-sidebar">
        <button id="chat-new-btn" class="chat-new-btn">＋ 新对话</button>
        <div id="chat-list"></div>
      </div>
      <div id="chat-messages" class="chat-messages"></div>
      <form id="chat-form" data-no-busy class="chat-input-bar">
        <input id="chat-input" type="text" placeholder="问问你的知识库..." autocomplete="off">
        <button type="submit" class="btn primary">发送</button>
      </form>
    </div>
  </div>
</div>

<dialog id="modal-sync" style="border:none;border-radius:12px;padding:24px;max-width:400px;width:90%;">
  <h3 style="margin:0 0 12px;">📂 同步收藏夹</h3>
  <div style="display:flex;flex-direction:column;gap:8px;margin:12px 0;">
    <a href="/ui/source-setup/douyin" class="btn secondary" style="text-align:center;">抖音</a>
    <a href="/ui/source-setup/bilibili" class="btn secondary" style="text-align:center;">B站</a>
    <a href="/ui/source-setup/xiaohongshu" class="btn secondary" style="text-align:center;">小红书</a>
  </div>
  <button onclick="this.closest('dialog').close()" style="width:100%;padding:8px;border:1px solid #ddd;border-radius:8px;background:none;cursor:pointer;">取消</button>
</dialog>
<dialog id="modal-link" style="border:none;border-radius:12px;padding:24px;max-width:400px;width:90%;">
  <h3 style="margin:0 0 12px;">🔗 粘贴链接</h3>
  <form method="post" action="/passive/link">
    <input name="url" type="url" placeholder="粘贴链接" required style="width:100%;padding:12px;border:1px solid #ddd;border-radius:8px;margin-bottom:12px;box-sizing:border-box;">
    <input type="hidden" name="process_now" value="true"><input type="hidden" name="transcribe" value="false">
    <button type="submit" class="btn primary" style="width:100%;">导入</button>
  </form>
  <button onclick="this.closest('dialog').close()" style="width:100%;padding:8px;border:1px solid #ddd;border-radius:8px;background:none;cursor:pointer;margin-top:8px;">取消</button>
</dialog>
<dialog id="modal-creator" style="border:none;border-radius:12px;padding:24px;max-width:400px;width:90%;">
  <h3 style="margin:0 0 12px;">👤 输入博主</h3>
  <form method="post" action="/distill/profile">
    <input name="profile_url" type="url" placeholder="博主主页链接" required style="width:100%;padding:12px;border:1px solid #ddd;border-radius:8px;margin-bottom:12px;box-sizing:border-box;">
    <input name="target_name" type="text" placeholder="博主名称" style="width:100%;padding:12px;border:1px solid #ddd;border-radius:8px;margin-bottom:12px;box-sizing:border-box;">
    <button type="submit" class="btn primary" style="width:100%;">开始蒸馏</button>
  </form>
  <button onclick="this.closest('dialog').close()" style="width:100%;padding:8px;border:1px solid #ddd;border-radius:8px;background:none;cursor:pointer;margin-top:8px;">取消</button>
</dialog>
<dialog id="modal-idea" style="border:none;border-radius:12px;padding:24px;max-width:400px;width:90%;">
  <h3 style="margin:0 0 12px;">💡 记录想法</h3>
  <form method="post" action="/manual/idea">
    <textarea name="content" rows="3" placeholder="写下想法..." required style="width:100%;padding:12px;border:1px solid #ddd;border-radius:8px;margin-bottom:12px;box-sizing:border-box;"></textarea>
    <input type="hidden" name="process_now" value="true">
    <button type="submit" class="btn primary" style="width:100%;">保存</button>
  </form>
  <button onclick="this.closest('dialog').close()" style="width:100%;padding:8px;border:1px solid #ddd;border-radius:8px;background:none;cursor:pointer;margin-top:8px;">取消</button>
</dialog>
{% endblock %}

{% block scripts %}
<style>
.home-container{position:relative;width:100%;height:calc(100vh - 80px);overflow:hidden;}
.home-graph-bg{position:absolute;inset:0;z-index:1;transition:all .5s ease;}
/* 图谱收缩：缩到左侧40%，无边框无白板 */
.home-container.graph-focused .home-graph-bg{width:40%;right:auto;left:0;}
.graph-empty-hint{position:absolute;top:50%;left:30%;transform:translate(-50%,-50%);z-index:2;display:flex;flex-direction:column;align-items:center;gap:8px;opacity:.4;pointer-events:none;}
.empty-dot{width:14px;height:14px;border-radius:50%;background:#215f52;}
.graph-empty-hint span{font-size:.8rem;color:#999;}
.empty-guide-btn{margin-top:8px;padding:8px 16px;background:#215f52;color:#fff;border-radius:8px;text-decoration:none;font-size:.85rem;}
.empty-guide-btn:hover{background:#1a4d42;}
.home-floating-panel{position:absolute;top:16px;right:16px;bottom:16px;width:400px;z-index:10;display:flex;flex-direction:column;gap:12px;transition:all .4s ease;}
.home-container.graph-focused .home-floating-panel{width:55%;}
.home-entries{display:flex;gap:8px;flex-shrink:0;}
.entry-chip{flex:1;padding:10px 6px;border:1px solid rgba(33,95,82,.12);border-radius:10px;background:rgba(255,255,255,.88);backdrop-filter:blur(8px);cursor:pointer;font-size:.82rem;text-align:center;transition:all .15s;}
.entry-chip:hover{background:#fff;border-color:#215f52;}
.home-chat{flex:1;display:flex;flex-direction:column;min-height:0;background:rgba(255,255,255,.9);backdrop-filter:blur(12px);border-radius:16px;border:1px solid rgba(33,95,82,.08);box-shadow:0 4px 24px rgba(0,0,0,.05);overflow:hidden;}
#chat-sidebar{display:flex;gap:6px;padding:8px 12px;border-bottom:1px solid #f0f0f0;overflow-x:auto;flex-shrink:0;align-items:center;}
.chat-new-btn{border:1px dashed #ccc;background:none;padding:4px 10px;border-radius:6px;font-size:.78rem;cursor:pointer;white-space:nowrap;color:#666;}
.chat-new-btn:hover{border-color:#215f52;color:#215f52;}
#chat-list{display:flex;gap:4px;overflow-x:auto;}
.chat-tab{border:none;background:#f4f4f4;padding:4px 10px;border-radius:6px;font-size:.75rem;cursor:pointer;white-space:nowrap;max-width:100px;overflow:hidden;text-overflow:ellipsis;}
.chat-tab.active{background:#215f52;color:#fff;}
.chat-tab-del{border:none;background:none;color:#999;font-size:.65rem;cursor:pointer;padding:0 2px;margin-left:2px;}
.chat-messages{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:10px;}
.chat-input-bar{display:flex;gap:8px;padding:12px;border-top:1px solid #f0f0f0;background:#fff;}
.chat-input-bar input{flex:1;padding:10px 14px;border:1px solid #ddd;border-radius:8px;font-size:.95rem;}
.chat-bubble-user{align-self:flex-end;background:#215f52;color:#fff;padding:10px 14px;border-radius:14px 14px 4px 14px;max-width:75%;word-break:break-word;}
.chat-bubble-ai{align-self:flex-start;background:#f4f7f6;padding:10px 14px;border-radius:14px 14px 14px 4px;max-width:75%;word-break:break-word;}
@media(max-width:900px){.home-floating-panel{width:calc(100% - 32px);}}
</style>
<script src="https://cdn.jsdelivr.net/npm/echarts@5/dist/echarts.min.js"></script>
<script>
(function(){
  var c=document.getElementById('home-container'),g=document.getElementById('home-graph'),eh=document.getElementById('graph-empty-hint');
  var ch=echarts.init(g),gd=null,fo=false;
  var P=['#215f52','#3a9e85','#50C878','#8fd4c0','#2d7a6b','#1ABC9C','#45b89a','#6ecfb5'],dm={},ci=0;
  function dc(d){if(!dm[d])dm[d]=P[ci++%P.length];return dm[d];}
  function opt(d,bg){return{backgroundColor:bg,series:[{type:'graph',layout:'force',roam:true,draggable:true,force:{repulsion:100,gravity:.04,edgeLength:[50,200]},data:d.nodes.map(function(n){return{id:String(n.id),name:n.label,symbolSize:Math.max(8,n.size*5),itemStyle:{color:dc(n.domain),shadowBlur:4,shadowColor:'rgba(33,95,82,.2)'},category:n.domain}}),links:d.edges.map(function(e){return{source:String(e.source),target:String(e.target),lineStyle:{width:Math.max(.5,e.weight*2),color:'rgba(33,95,82,.15)'}}}),categories:[...new Set(d.nodes.map(function(n){return n.domain}))].map(function(d){return{name:d}}),label:{show:true,position:'right',fontSize:10,color:'#555'},lineStyle:{color:'source'},emphasis:{focus:'adjacency'}}]};}
  fetch('/api/graph').then(function(r){return r.json()}).then(function(d){
    gd=d;if(!d.nodes.length){eh.style.display='flex';ch.setOption({backgroundColor:'transparent',series:[{type:'graph',layout:'none',data:[{x:300,y:200,symbolSize:14,itemStyle:{color:'#215f52'},name:''}],links:[]}]});return;}
    ch.setOption(opt(d,'transparent'));
  });
  // 鼠标移入图谱区域 → 收缩到左侧（同一图层，无边框）
  g.addEventListener('mouseenter',function(){if(fo||!gd||!gd.nodes.length)return;fo=true;c.classList.add('graph-focused');setTimeout(function(){ch.resize();},500);});
  // 鼠标移出图谱 → 还原铺满
  g.addEventListener('mouseleave',function(){if(!fo)return;fo=false;c.classList.remove('graph-focused');setTimeout(function(){ch.resize();},500);});
  window.addEventListener('resize',function(){ch.resize();});
})();
</script>
<script>
(function(){
  var mb=document.getElementById('chat-messages'),fm=document.getElementById('chat-form'),ip=document.getElementById('chat-input');
  var listEl=document.getElementById('chat-list'),newBtn=document.getElementById('chat-new-btn');
  var cid=null;

  function renderBubble(role,content){
    var d=document.createElement('div');d.className=role==='user'?'chat-bubble-user':'chat-bubble-ai';
    d.textContent=content;mb.appendChild(d);mb.scrollTop=mb.scrollHeight;return d;
  }

  async function loadConversations(){
    var res=await fetch('/api/conversations');var convos=await res.json();
    listEl.innerHTML='';
    convos.slice(0,8).forEach(function(c){
      var btn=document.createElement('button');btn.className='chat-tab'+(c.id===cid?' active':'');
      btn.textContent=c.title;btn.onclick=function(){switchConversation(c.id);};
      listEl.appendChild(btn);
    });
  }

  async function switchConversation(id){
    cid=id;mb.innerHTML='';
    var res=await fetch('/api/conversations/'+id+'/messages');var msgs=await res.json();
    msgs.forEach(function(m){
      var d=document.createElement('div');d.className=m.role==='user'?'chat-bubble-user':'chat-bubble-ai';
      d.textContent=m.content;mb.appendChild(d);
    });
    mb.scrollTop=mb.scrollHeight;
    loadConversations();
  }

  async function createConversation(){
    var res=await fetch('/api/conversations',{method:'POST'});var data=await res.json();
    cid=data.id;mb.innerHTML='';loadConversations();
  }

  newBtn.onclick=createConversation;

  fm.onsubmit=async function(e){
    e.preventDefault();var q=ip.value.trim();if(!q)return;
    if(!cid)await createConversation();
    ip.value='';renderBubble('user',q);
    var l=renderBubble('assistant','思考中...');l.style.opacity='.6';
    try{
      var r=await fetch('/api/conversations/'+cid+'/messages',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({question:q})});
      var d=await r.json();l.style.opacity='1';
      if(d.content_html)l.innerHTML=d.content_html;else l.textContent=d.content||'回答失败';
    }catch(err){l.textContent='请求失败';l.style.opacity='1';}
    mb.scrollTop=mb.scrollHeight;loadConversations();
  };

  // Init: load conversations, select latest
  (async function(){
    var res=await fetch('/api/conversations');var convos=await res.json();
    if(convos.length){await switchConversation(convos[0].id);}
    else{await createConversation();}
  })();
})();
</script>
{% endblock %}
