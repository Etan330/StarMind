{% extends "base.html" %}
{% import "_components.html" as ui %}
{% set title = "StarMind 首页" %}

{% block content %}
<!-- 知识星链图谱 -->
<section class="glass-card" style="padding:16px;margin-bottom:24px;">
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;">
    <h2 style="margin:0;font-size:1.2rem;">✨ 知识星链</h2>
    <a href="/ui/graph" style="font-size:0.85rem;color:#4A90D9;">全屏查看 →</a>
  </div>
  <div id="home-graph" style="width:100%;height:320px;border-radius:8px;background:#1a1a2e;"></div>
</section>

<!-- 向知识库提问 — 对话模式 -->
<section class="glass-card" id="chat-section" style="padding:0;margin-bottom:24px;display:flex;height:480px;overflow:hidden;">
  <!-- 左侧对话列表 -->
  <aside id="chat-sidebar" style="width:200px;border-right:1px solid #eee;display:flex;flex-direction:column;padding:12px;gap:8px;overflow-y:auto;">
    <button id="chat-new-btn" class="btn primary" style="width:100%;font-size:0.85rem;">＋ 新对话</button>
    <div id="chat-list" style="flex:1;overflow-y:auto;display:flex;flex-direction:column;gap:4px;"></div>
  </aside>
  <!-- 右侧聊天区 -->
  <div style="flex:1;display:flex;flex-direction:column;">
    <form id="chat-form" style="display:flex;gap:8px;padding:12px;border-bottom:1px solid #eee;">
      <input id="chat-input" type="text" placeholder="问问你的知识库..." style="flex:1;padding:10px 14px;border:1px solid #ddd;border-radius:8px;font-size:0.95rem;" autocomplete="off">
      <button type="submit" class="btn primary" style="white-space:nowrap;">发送</button>
    </form>
    <div id="chat-messages" style="flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column-reverse;gap:12px;"></div>
  </div>
</section>

<!-- 四个快捷入口 -->
<section class="glass-card" style="padding:24px;margin-bottom:24px;">
  <h2 style="margin:0 0 16px;font-size:1.1rem;">📥 导入内容到知识库</h2>
  <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:12px;">
    <button onclick="document.getElementById('modal-sync').showModal()" class="entry-card" style="cursor:pointer;border:1px solid #eee;border-radius:12px;padding:16px;text-align:center;background:none;">
      <span style="font-size:1.5rem;">📂</span>
      <strong style="display:block;margin-top:8px;">同步收藏</strong>
    </button>
    <button onclick="document.getElementById('modal-link').showModal()" class="entry-card" style="cursor:pointer;border:1px solid #eee;border-radius:12px;padding:16px;text-align:center;background:none;">
      <span style="font-size:1.5rem;">🔗</span>
      <strong style="display:block;margin-top:8px;">粘贴链接</strong>
    </button>
    <button onclick="document.getElementById('modal-creator').showModal()" class="entry-card" style="cursor:pointer;border:1px solid #eee;border-radius:12px;padding:16px;text-align:center;background:none;">
      <span style="font-size:1.5rem;">👤</span>
      <strong style="display:block;margin-top:8px;">输入博主</strong>
    </button>
    <button onclick="document.getElementById('modal-idea').showModal()" class="entry-card" style="cursor:pointer;border:1px solid #eee;border-radius:12px;padding:16px;text-align:center;background:none;">
      <span style="font-size:1.5rem;">💡</span>
      <strong style="display:block;margin-top:8px;">写想法</strong>
    </button>
  </div>
</section>

<!-- 弹窗：同步收藏 -->
<dialog id="modal-sync" style="border:none;border-radius:12px;padding:24px;max-width:480px;width:90%;">
  <h3 style="margin:0 0 12px;">📂 同步收藏夹</h3>
  <p style="color:#666;font-size:0.9rem;">选择平台进入收藏管理页面。</p>
  <div style="display:flex;flex-direction:column;gap:8px;margin:16px 0;">
    <a href="/ui/source-setup/douyin" class="btn secondary" style="text-align:center;">抖音</a>
    <a href="/ui/source-setup/bilibili" class="btn secondary" style="text-align:center;">B站</a>
    <a href="/ui/source-setup/xiaohongshu" class="btn secondary" style="text-align:center;">小红书</a>
    <a href="/ui/sync" class="btn secondary" style="text-align:center;">更多平台...</a>
  </div>
  <button onclick="this.closest('dialog').close()" style="width:100%;padding:10px;border:1px solid #ddd;border-radius:8px;background:none;cursor:pointer;">取消</button>
</dialog>

<!-- 弹窗：粘贴链接 -->
<dialog id="modal-link" style="border:none;border-radius:12px;padding:24px;max-width:480px;width:90%;">
  <h3 style="margin:0 0 12px;">🔗 粘贴链接</h3>
  <form method="post" action="/passive/link">
    <input name="url" type="url" placeholder="粘贴视频或文章链接" required style="width:100%;padding:12px;border:1px solid #ddd;border-radius:8px;margin-bottom:12px;box-sizing:border-box;">
    <input name="title" type="text" placeholder="标题（可选）" style="width:100%;padding:12px;border:1px solid #ddd;border-radius:8px;margin-bottom:12px;box-sizing:border-box;">
    <input type="hidden" name="process_now" value="true">
    <input type="hidden" name="transcribe" value="false">
    <button type="submit" class="btn primary" style="width:100%;">导入到知识库</button>
  </form>
  <button onclick="this.closest('dialog').close()" style="width:100%;padding:10px;border:1px solid #ddd;border-radius:8px;background:none;cursor:pointer;margin-top:8px;">取消</button>
</dialog>

<!-- 弹窗：输入博主 -->
<dialog id="modal-creator" style="border:none;border-radius:12px;padding:24px;max-width:480px;width:90%;">
  <h3 style="margin:0 0 12px;">👤 输入博主主页</h3>
  <form method="post" action="/distill/profile">
    <input name="profile_url" type="url" placeholder="博主主页链接" required style="width:100%;padding:12px;border:1px solid #ddd;border-radius:8px;margin-bottom:12px;box-sizing:border-box;">
    <input name="target_name" type="text" placeholder="博主名称" style="width:100%;padding:12px;border:1px solid #ddd;border-radius:8px;margin-bottom:12px;box-sizing:border-box;">
    <input name="platform" type="text" placeholder="平台（如：抖音）" value="社交媒体" style="width:100%;padding:12px;border:1px solid #ddd;border-radius:8px;margin-bottom:12px;box-sizing:border-box;">
    <button type="submit" class="btn primary" style="width:100%;">开始蒸馏</button>
  </form>
  <button onclick="this.closest('dialog').close()" style="width:100%;padding:10px;border:1px solid #ddd;border-radius:8px;background:none;cursor:pointer;margin-top:8px;">取消</button>
</dialog>

<!-- 弹窗：写想法 -->
<dialog id="modal-idea" style="border:none;border-radius:12px;padding:24px;max-width:480px;width:90%;">
  <h3 style="margin:0 0 12px;">💡 记录想法</h3>
  <form method="post" action="/manual/idea">
    <input name="title" type="text" placeholder="想法标题" style="width:100%;padding:12px;border:1px solid #ddd;border-radius:8px;margin-bottom:12px;box-sizing:border-box;">
    <textarea name="content" rows="4" placeholder="写下你的想法..." required style="width:100%;padding:12px;border:1px solid #ddd;border-radius:8px;margin-bottom:12px;box-sizing:border-box;resize:vertical;"></textarea>
    <input type="hidden" name="process_now" value="true">
    <button type="submit" class="btn primary" style="width:100%;">保存到知识库</button>
  </form>
  <button onclick="this.closest('dialog').close()" style="width:100%;padding:10px;border:1px solid #ddd;border-radius:8px;background:none;cursor:pointer;margin-top:8px;">取消</button>
</dialog>

<!-- ECharts 知识星链 -->
<script src="https://cdn.jsdelivr.net/npm/echarts@5/dist/echarts.min.js"></script>
<script>
const chart = echarts.init(document.getElementById('home-graph'));
const PALETTE = ['#4A90D9','#E85D75','#50C878','#F5A623','#9B59B6','#1ABC9C','#E67E22','#3498DB'];
const domainColors = {};
let ci = 0;
function dc(d) { if (!domainColors[d]) domainColors[d] = PALETTE[ci++ % PALETTE.length]; return domainColors[d]; }

fetch('/api/graph').then(r => r.json()).then(data => {
  const nodes = data.nodes.map(n => ({
    id: String(n.id), name: n.label, symbolSize: Math.max(10, n.size * 6),
    itemStyle: {color: dc(n.domain)}, category: n.domain
  }));
  const edges = data.edges.map(e => ({source: String(e.source), target: String(e.target), lineStyle: {width: Math.max(1, e.weight * 3), opacity: 0.4}}));
  const categories = [...new Set(data.nodes.map(n => n.domain))].map(d => ({name: d}));

  chart.setOption({
    backgroundColor: '#1a1a2e',
    tooltip: {trigger: 'item', formatter: p => p.data?.name || ''},
    legend: {data: categories.map(c=>c.name), top: 8, textStyle: {color: '#aaa', fontSize: 10}},
    series: [{
      type: 'graph', layout: 'force', roam: true, draggable: true,
      force: {repulsion: 80, gravity: 0.06, edgeLength: [40, 160]},
      data: nodes, links: edges, categories,
      label: {show: true, position: 'right', fontSize: 9, color: '#ccc'},
      lineStyle: {color: 'source'},
      emphasis: {focus: 'adjacency'}
    }]
  });
});
window.addEventListener('resize', () => chart.resize());
</script>

<script>
(function() {
  const msgBox = document.getElementById('chat-messages');
  const form = document.getElementById('chat-form');
  const input = document.getElementById('chat-input');
  const listEl = document.getElementById('chat-list');
  const newBtn = document.getElementById('chat-new-btn');
  let currentConvoId = null;

  function renderBubble(role, content, isHtml) {
    const div = document.createElement('div');
    div.style.cssText = role === 'user'
      ? 'align-self:flex-end;background:#4A90D9;color:#fff;padding:10px 14px;border-radius:12px 12px 2px 12px;max-width:75%;word-break:break-word;'
      : 'align-self:flex-start;background:#f1f3f5;padding:10px 14px;border-radius:12px 12px 12px 2px;max-width:75%;word-break:break-word;';
    if (isHtml) { div.innerHTML = content; } else { div.textContent = content; }
    msgBox.prepend(div);
    return div;
  }

  async function loadConversations() {
    const res = await fetch('/api/conversations');
    const convos = await res.json();
    listEl.innerHTML = '';
    convos.forEach(c => {
      const btn = document.createElement('button');
      btn.textContent = c.title;
      btn.dataset.id = c.id;
      btn.style.cssText = 'width:100%;text-align:left;padding:8px;border:none;border-radius:6px;background:' + (c.id === currentConvoId ? '#e8f0fe' : 'none') + ';cursor:pointer;font-size:0.82rem;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;';
      btn.onclick = () => switchConversation(c.id);
      listEl.appendChild(btn);
    });
  }

  async function switchConversation(id) {
    currentConvoId = id;
    msgBox.innerHTML = '';
    const res = await fetch('/api/conversations/' + id + '/messages');
    const msgs = await res.json();
    msgs.slice().reverse().forEach(m => renderBubble(m.role, m.content, false));
    loadConversations();
  }

  async function createConversation() {
    const res = await fetch('/api/conversations', {method: 'POST'});
    const data = await res.json();
    currentConvoId = data.id;
    msgBox.innerHTML = '';
    await loadConversations();
  }

  newBtn.onclick = createConversation;

  form.onsubmit = async (e) => {
    e.preventDefault();
    const q = input.value.trim();
    if (!q) return;
    if (!currentConvoId) await createConversation();
    input.value = '';
    renderBubble('user', q, false);
    const loading = renderBubble('assistant', '思考中...', false);
    loading.style.opacity = '0.6';
    try {
      const res = await fetch('/api/conversations/' + currentConvoId + '/messages', {
        method: 'POST', headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({question: q})
      });
      const data = await res.json();
      loading.style.opacity = '1';
      if (data.content_html) { loading.innerHTML = data.content_html; }
      else { loading.textContent = data.content || data.detail || '回答失败'; }
    } catch (err) {
      loading.textContent = '请求失败: ' + err.message;
      loading.style.opacity = '1';
    }
    loadConversations();
  };

  // Init: load conversations and auto-select latest
  (async () => {
    const res = await fetch('/api/conversations');
    const convos = await res.json();
    if (convos.length) { await switchConversation(convos[0].id); }
    else { await loadConversations(); }
  })();
})();
</script>
{% endblock %}
