{% extends "base.html" %}
{% import "_components.html" as ui %}
{% set title = "StarMind 首页" %}

{% block content %}
<div class="home-container chat-first" id="home-container">
  <main class="chat-stage" id="home-panel">
    <div class="home-entries">
      <a href="/ui/sync?mode=sync" class="entry-chip">同步收藏</a>
      <a href="/ui/sync?mode=link" class="entry-chip">粘贴链接</a>
      <a href="/ui/sync?mode=creator" class="entry-chip">输入博主</a>
      <a href="/ui/sync?mode=idea" class="entry-chip">写想法</a>
    </div>
    <div class="home-chat">
      <div class="chat-body">
        <!-- 左侧历史对话列表 -->
        <div id="chat-sidebar">
          <button id="chat-new-btn" class="chat-new-btn">＋ 新对话</button>
          <div id="chat-list"></div>
        </div>
        <!-- 右侧对话内容 -->
        <div class="chat-main">
          <div id="chat-messages" class="chat-messages"></div>
          <form id="chat-form" data-no-busy class="chat-input-bar">
            <textarea id="chat-input" rows="3" placeholder="问问你的知识库..." autocomplete="off"></textarea>
            <button type="submit" class="btn primary">发送</button>
          </form>
        </div>
      </div>
    </div>
  </main>

  <button id="graph-drawer-toggle" class="graph-drawer-toggle" type="button" aria-expanded="false" aria-controls="graph-drawer">
    知识图谱
  </button>
  <aside id="graph-drawer" class="graph-drawer" aria-label="知识图谱">
    <div id="home-graph" class="home-graph-bg"></div>
    <div id="graph-empty-hint" class="graph-empty-hint" style="display:none;">
      <div class="empty-dot"></div>
      <span>知识图谱（添加内容后显示）</span>
      <a href="/ui/sync" class="empty-guide-btn">开始第一步：同步你的收藏夹 →</a>
    </div>
  </aside>
</div>

{% endblock %}

{% block scripts %}
<style>
.page-surface:has(.home-container){width:100%;max-width:100%;padding:0;margin:0;}
.home-container{position:relative;width:100%;height:calc(100vh - 80px);overflow:hidden;background:linear-gradient(135deg,#f6faf8 0%,#eef6f2 100%);}
.chat-stage{position:absolute;inset:18px 64px 18px 18px;z-index:5;display:flex;flex-direction:column;gap:12px;transform:translate3d(0,0,0);transition:transform .32s cubic-bezier(.2,.8,.2,1),filter .32s ease;will-change:transform,filter;}
.home-container.graph-drawer-open .chat-stage{transform:translate3d(-18px,0,0);filter:brightness(.98);}
.graph-drawer-toggle{position:absolute;right:14px;top:50%;z-index:14;transform:translateY(-50%);writing-mode:vertical-rl;border:1px solid rgba(33,95,82,.16);background:rgba(255,255,255,.86);color:#215f52;border-radius:999px;padding:14px 9px;box-shadow:0 12px 32px rgba(19,55,48,.12);backdrop-filter:blur(14px);cursor:pointer;letter-spacing:0;font-size:.82rem;transition:transform .24s ease,background .18s ease,border-color .18s ease;}
.graph-drawer-toggle:hover{background:#fff;border-color:#215f52;transform:translateY(-50%) translateX(-2px);}
.graph-drawer{position:absolute;top:18px;right:18px;bottom:18px;width:min(46vw,620px);z-index:12;overflow:hidden;border:1px solid rgba(33,95,82,.1);border-radius:20px;background:rgba(255,255,255,.78);backdrop-filter:blur(18px) saturate(1.08);box-shadow:0 22px 60px rgba(19,55,48,.16);transform:translate3d(calc(100% + 28px),0,0);transition:transform .32s cubic-bezier(.2,.8,.2,1),opacity .22s ease;will-change:transform;pointer-events:none;opacity:.98;}
.home-container.graph-drawer-open .graph-drawer{transform:translate3d(0,0,0);pointer-events:auto;}
.home-graph-bg{position:absolute;inset:0;z-index:1;transition:transform .32s ease;will-change:transform;}
.home-container.graph-drawer-open .home-graph-bg{transform:scale(1.01);}
.graph-empty-hint{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);z-index:2;display:flex;flex-direction:column;align-items:center;gap:8px;opacity:.48;pointer-events:none;}
.empty-dot{width:14px;height:14px;border-radius:50%;background:#215f52;}
.graph-empty-hint span{font-size:.8rem;color:#777;}
.empty-guide-btn{margin-top:8px;padding:8px 16px;background:#215f52;color:#fff;border-radius:8px;text-decoration:none;font-size:.85rem;pointer-events:auto;}
.empty-guide-btn:hover{background:#1a4d42;}
.home-entries{display:flex;gap:8px;flex-shrink:0;opacity:1;transform:translateY(0);transition:opacity .18s ease,transform .24s ease;}
.entry-chip{flex:1;padding:10px 8px;border:1px solid rgba(33,95,82,.12);border-radius:10px;background:rgba(255,255,255,.78);backdrop-filter:blur(10px);cursor:pointer;font-size:.82rem;text-align:center;transition:background .15s,border-color .15s,transform .15s;box-shadow:0 8px 24px rgba(19,55,48,.06);}
.entry-chip:hover{background:#fff;border-color:#215f52;transform:translateY(-1px);}
.home-chat{flex:1;display:flex;flex-direction:column;min-height:0;background:rgba(255,255,255,.9);backdrop-filter:blur(18px) saturate(1.05);border-radius:18px;border:1px solid rgba(33,95,82,.1);box-shadow:0 18px 50px rgba(19,55,48,.12);overflow:hidden;transition:box-shadow .32s ease,opacity .2s ease;}
.chat-body{flex:1;display:flex;min-height:0;}
#chat-sidebar{width:152px;border-right:1px solid rgba(33,95,82,.08);padding:12px 10px;overflow-y:auto;display:flex;flex-direction:column;gap:4px;flex-shrink:0;background:rgba(250,252,251,.62);}
.chat-new-btn{border:1px dashed rgba(33,95,82,.35);background:rgba(255,255,255,.72);padding:8px 10px;border-radius:8px;font-size:.8rem;cursor:pointer;color:#315d53;text-align:center;}
.chat-new-btn:hover{border-color:#215f52;color:#215f52;background:#fff;}
#chat-list{display:flex;flex-direction:column;gap:4px;margin-top:8px;}
.chat-tab-row{display:flex;align-items:center;gap:0;position:relative;}
.chat-tab{flex:1;border:none;background:rgba(33,95,82,.06);padding:8px 9px;border-radius:8px;font-size:.76rem;cursor:pointer;text-align:left;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:#41504d;}
.chat-tab.active{background:#215f52;color:#fff;}
.chat-tab-actions{display:none;position:absolute;right:3px;top:50%;transform:translateY(-50%);gap:1px;}
.chat-tab-row:hover .chat-tab-actions{display:flex;}
.chat-tab-act{border:none;background:rgba(255,255,255,.7);font-size:.6rem;cursor:pointer;padding:2px;color:#777;border-radius:3px;}
.chat-tab-act:hover{background:#eee;color:#333;}
.chat-main{flex:1;display:flex;flex-direction:column;min-width:0;min-height:0;}
.chat-messages{flex:1;overflow-y:auto;padding:22px;display:flex;flex-direction:column;gap:12px;scroll-behavior:smooth;}
.chat-input-bar{display:grid;grid-template-columns:1fr auto;gap:10px;padding:14px;border-top:1px solid rgba(33,95,82,.08);background:rgba(255,255,255,.86);}
.chat-input-bar textarea{flex:1;min-height:74px;max-height:180px;resize:vertical;padding:12px 14px;border:1px solid rgba(33,95,82,.18);border-radius:10px;font-size:.95rem;line-height:1.45;background:rgba(255,255,255,.9);outline:none;}
.chat-input-bar textarea:focus{border-color:#215f52;box-shadow:0 0 0 3px rgba(33,95,82,.1);}
.chat-input-bar button{align-self:end;min-height:42px;}
.chat-bubble-user{align-self:flex-end;background:#215f52;color:#fff;padding:11px 15px;border-radius:16px 16px 5px 16px;max-width:82%;word-break:break-word;line-height:1.55;}
.chat-bubble-ai{align-self:flex-start;background:rgba(244,247,246,.92);padding:13px 16px;border-radius:16px 16px 16px 5px;max-width:86%;word-break:break-word;line-height:1.65;color:#24332f;}
.chat-bubble-ai .markdown-body{display:block;}
.chat-bubble-ai .markdown-body>*:first-child{margin-top:0;}
.chat-bubble-ai .markdown-body>*:last-child{margin-bottom:0;}
.chat-bubble-ai .markdown-body p{margin:.45em 0;}
.chat-bubble-ai .markdown-body ul,.chat-bubble-ai .markdown-body ol{margin:.5em 0;padding-left:1.35em;}
.chat-bubble-ai .markdown-body li+li{margin-top:.25em;}
.chat-bubble-ai .markdown-body pre{white-space:pre-wrap;overflow:auto;background:rgba(33,95,82,.06);border-radius:8px;padding:10px;}
.chat-bubble-ai .markdown-body blockquote{margin:.6em 0;padding-left:12px;border-left:3px solid rgba(33,95,82,.22);color:#52605c;}
.tour-overlay{position:fixed;inset:0;z-index:1000;background:rgba(11,27,24,.38);opacity:0;pointer-events:none;transition:opacity .18s ease;}
.tour-overlay.active{opacity:1;pointer-events:auto;}
.tour-spotlight{position:fixed;z-index:1001;border:2px solid rgba(143,212,192,.98);border-radius:14px;box-shadow:0 0 0 9999px rgba(11,27,24,.46),0 14px 38px rgba(0,0,0,.16);pointer-events:none;transition:top .2s ease,left .2s ease,width .2s ease,height .2s ease;}
.tour-card{position:fixed;z-index:1002;width:min(340px,calc(100vw - 32px));padding:16px;border-radius:14px;background:rgba(255,255,255,.96);box-shadow:0 20px 60px rgba(11,27,24,.2);border:1px solid rgba(33,95,82,.12);color:#23332f;transition:top .2s ease,left .2s ease;}
.tour-card h3{margin:0 0 8px;font-size:1rem;color:#215f52;}
.tour-card p{margin:0;color:#50605c;line-height:1.55;font-size:.9rem;}
.tour-card-actions{display:flex;align-items:center;justify-content:space-between;gap:8px;margin-top:14px;}
.tour-card-actions button{border:1px solid rgba(33,95,82,.16);border-radius:999px;background:#fff;color:#215f52;padding:7px 11px;cursor:pointer;font-size:.82rem;}
.tour-card-actions .primary{background:#215f52;color:#fff;}
.tour-progress{font-size:.76rem;color:#7b8a86;}
@media(max-width:900px){.chat-stage{inset:12px 54px 12px 12px;}.graph-drawer{top:12px;right:12px;bottom:12px;width:calc(100vw - 72px);}#chat-sidebar{width:118px;}.chat-messages{padding:16px;}}
</style>
<script src="/static/echarts.min.js?v=5"></script>
<script>
(function(){
  var c=document.getElementById('home-container'),g=document.getElementById('home-graph'),toggle=document.getElementById('graph-drawer-toggle'),drawer=document.getElementById('graph-drawer'),eh=document.getElementById('graph-empty-hint');
  var ch=echarts.init(g),gd=null;
  var P=['#215f52','#3a9e85','#50C878','#8fd4c0','#2d7a6b','#1ABC9C','#45b89a','#6ecfb5'],dm={},ci=0;
  function dc(d){if(!dm[d])dm[d]=P[ci++%P.length];return dm[d];}
  function openWikiPage(pageId){if(!pageId)return;window.location.assign('/ui/wiki?page_id='+encodeURIComponent(pageId));}
  function getClickedPageId(params){
    if(params.dataType==='node'&&params.data&&params.data.id)return params.data.id;
    if(params.componentType==='series'&&params.seriesType==='graph'&&params.data&&params.data.id)return params.data.id;
    if(params.name){
      var option=ch.getOption();
      var data=option&&option.series&&option.series[0]&&option.series[0].data||[];
      var node=data.find(function(item){return item.name===params.name||item.id===params.name;});
      return node&&node.id;
    }
    return null;
  }
  function opt(d,bg){return{backgroundColor:bg,series:[{type:'graph',layout:'force',roam:true,draggable:false,force:{repulsion:100,gravity:.04,edgeLength:[50,200]},data:d.nodes.map(function(n){return{id:String(n.id),name:n.label,symbolSize:Math.max(24,n.size*6),itemStyle:{color:dc(n.domain),shadowBlur:4,shadowColor:'rgba(33,95,82,.2)'},category:n.domain,cursor:'pointer'}}),links:d.edges.map(function(e){return{source:String(e.source),target:String(e.target),lineStyle:{width:Math.max(.5,e.weight*2),color:'rgba(33,95,82,.15)'}}}),categories:[...new Set(d.nodes.map(function(n){return n.domain}))].map(function(d){return{name:d}}),label:{show:true,position:'right',fontSize:10,color:'#555'},lineStyle:{color:'source'},emphasis:{focus:'adjacency'}}]};}
  fetch('/api/graph').then(function(r){return r.json()}).then(function(d){
    gd=d;if(!d.nodes.length){eh.style.display='flex';ch.setOption({backgroundColor:'transparent',series:[{type:'graph',layout:'none',data:[{x:300,y:200,symbolSize:14,itemStyle:{color:'#215f52'},name:''}],links:[]}]});return;}
    ch.setOption(opt(d,'transparent'));
  });
  ch.on('click',function(params){openWikiPage(getClickedPageId(params));});
  function setDrawerOpen(open){
    c.classList.toggle('graph-drawer-open',open);
    toggle.setAttribute('aria-expanded',open?'true':'false');
    window.setTimeout(function(){ch.resize();},340);
  }
  window.setHomeGraphDrawerOpen=setDrawerOpen;
  toggle.addEventListener('click',function(){setDrawerOpen(!c.classList.contains('graph-drawer-open'));});
  drawer.addEventListener('keydown',function(e){if(e.key==='Escape')setDrawerOpen(false);});
  window.addEventListener('resize',function(){ch.resize();});
  setTimeout(function(){ch.resize();},100);
})();
</script>
<script>
(function(){
  var STORAGE_KEY='StarMind_onboarding_completed';
  var tourSteps=[
    {target:'#chat-messages',title:'对话区',body:'向知识库提问。'},
    {target:'#chat-input',title:'输入框',body:'写问题或长 Prompt。'},
    {target:'#chat-new-btn',title:'新对话',body:'开启一个新主题。'},
    {target:'.home-entries',title:'内容入口',body:'同步、导入、记录想法。'},
    {target:'#graph-drawer',title:'知识图谱',body:'查看知识关系。',graphDrawer:true},
    {target:"a[href='/ui/wiki']",title:'知识库',body:'查看和编辑 Wiki。'},
    {target:"a[href='/ui/push-settings']",title:'推送',body:'设置主动复习。'}
  ];
  var idx=0,overlay=null,spotlight=null,card=null,tourScrollX=0,tourScrollY=0;
  function makeTour(){
    tourScrollX=window.scrollX;tourScrollY=window.scrollY;
    overlay=document.createElement('div');overlay.className='tour-overlay';
    spotlight=document.createElement('div');spotlight.className='tour-spotlight';
    card=document.createElement('div');card.className='tour-card';
    document.body.appendChild(overlay);document.body.appendChild(spotlight);document.body.appendChild(card);
  }
  function restoreTourViewport(){window.scrollTo(tourScrollX,tourScrollY);}
  function finishTour(){
    localStorage.setItem(STORAGE_KEY,'1');
    if(window.setHomeGraphDrawerOpen)window.setHomeGraphDrawerOpen(false);
    [overlay,spotlight,card].forEach(function(el){if(el)el.remove();});
    overlay=spotlight=card=null;
    restoreTourViewport();
  }
  function showStep(i){
    if(!overlay)makeTour();
    idx=i;
    var step=tourSteps[idx];
    if(window.setHomeGraphDrawerOpen)window.setHomeGraphDrawerOpen(!!step.graphDrawer);
    var target=document.querySelector(step.target);
    if(!target){if(idx<tourSteps.length-1)showStep(idx+1);else finishTour();return;}
    window.setTimeout(function(){
      var r=target.getBoundingClientRect(),pad=8;
      overlay.classList.add('active');
      spotlight.style.top=Math.max(8,r.top-pad)+'px';
      spotlight.style.left=Math.max(8,r.left-pad)+'px';
      spotlight.style.width=Math.min(window.innerWidth-16,r.width+pad*2)+'px';
      spotlight.style.height=Math.min(window.innerHeight-16,r.height+pad*2)+'px';
      var cardLeft=Math.min(window.innerWidth-356,Math.max(16,r.left));
      var cardTop=r.bottom+18;
      if(cardTop+220>window.innerHeight)cardTop=Math.max(16,r.top-238);
      card.style.left=cardLeft+'px';card.style.top=cardTop+'px';
      card.innerHTML='<h3>'+step.title+'</h3><p>'+step.body+'</p><div class="tour-card-actions"><span class="tour-progress">'+(idx+1)+' / '+tourSteps.length+'</span><span><button type="button" data-tour="skip">跳过</button> '+(idx>0?'<button type="button" data-tour="prev">上一步</button> ':'')+'<button type="button" class="primary" data-tour="next">'+(idx===tourSteps.length-1?'完成':'下一步')+'</button></span></div>';
    },step.graphDrawer?360:180);
  }
  document.addEventListener('click',function(e){
    var action=e.target&&e.target.dataset?e.target.dataset.tour:'';
    if(!action)return;
    if(action==='skip'||(action==='next'&&idx===tourSteps.length-1)){finishTour();return;}
    if(action==='next')showStep(idx+1);
    if(action==='prev')showStep(Math.max(0,idx-1));
  });
  window.addEventListener('resize',function(){if(overlay)showStep(idx);});
  document.getElementById('restart-tour-btn').onclick=function(){localStorage.removeItem(STORAGE_KEY);showStep(0);};
  if(!localStorage.getItem(STORAGE_KEY))window.setTimeout(function(){showStep(0);},600);
})();
</script>
<script>
(function(){
  var mb=document.getElementById('chat-messages'),fm=document.getElementById('chat-form'),ip=document.getElementById('chat-input');
  var listEl=document.getElementById('chat-list'),newBtn=document.getElementById('chat-new-btn');
  var cid=null;

  function renderBubble(role,content){
    var d=document.createElement('div');d.className=role==='user'?'chat-bubble-user':'chat-bubble-ai';
    d.textContent=content;mb.appendChild(d);mb.scrollTop=mb.scrollHeight;return d;
  }

  async function loadConversations(){
    var res=await fetch('/api/conversations');var convos=await res.json();
    listEl.innerHTML='';
    convos.slice(0,12).forEach(function(c){
      var row=document.createElement('div');row.className='chat-tab-row';
      var btn=document.createElement('button');btn.className='chat-tab'+(c.id===cid?' active':'');
      btn.textContent=c.title;
      btn.onclick=function(){switchConversation(c.id);};
      var actions=document.createElement('span');actions.className='chat-tab-actions';
      var renameBtn=document.createElement('button');renameBtn.className='chat-tab-act';renameBtn.textContent='✏';
      renameBtn.onclick=function(e){
        e.stopPropagation();
        var name=prompt('重命名对话',c.title);
        if(name&&name.trim()) fetch('/api/conversations/'+c.id+'/rename',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({title:name.trim()})}).then(function(){loadConversations();});
      };
      var delBtn=document.createElement('button');delBtn.className='chat-tab-act';delBtn.textContent='✕';
      delBtn.onclick=function(e){
        e.stopPropagation();
        if(!confirm('删除这个对话？'))return;
        fetch('/api/conversations/'+c.id,{method:'DELETE'}).then(function(){
          if(cid===c.id){cid=null;mb.innerHTML='';}
          loadConversations();
        });
      };
      actions.appendChild(renameBtn);actions.appendChild(delBtn);
      row.appendChild(btn);row.appendChild(actions);
      listEl.appendChild(row);
    });
  }

  async function switchConversation(id){
    cid=id;mb.innerHTML='';
    var res=await fetch('/api/conversations/'+id+'/messages');var msgs=await res.json();
    msgs.forEach(function(m){
      var d=document.createElement('div');d.className=m.role==='user'?'chat-bubble-user':'chat-bubble-ai';
      if(m.role==='assistant'&&m.content_html)d.innerHTML=m.content_html;else d.textContent=m.content;mb.appendChild(d);
    });
    mb.scrollTop=mb.scrollHeight;
    loadConversations();
  }

  async function createConversation(){
    var res=await fetch('/api/conversations',{method:'POST'});var data=await res.json();
    cid=data.id;mb.innerHTML='';loadConversations();return data;
  }

  newBtn.onclick=function(){cid=null;mb.innerHTML='';loadConversations();ip.focus();};

  ip.addEventListener('keydown',function(e){
    if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();fm.requestSubmit();}
  });

  fm.onsubmit=async function(e){
    e.preventDefault();var q=ip.value.trim();if(!q)return;
    if(!cid)await createConversation();
    ip.value='';renderBubble('user',q);
    var l=renderBubble('assistant','思考中...');l.style.opacity='.6';
    try{
      var r=await fetch('/api/conversations/'+cid+'/messages',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({question:q})});
      var d=await r.json();l.style.opacity='1';
      if(d.content_html)l.innerHTML=d.content_html;else l.textContent=d.content||'回答失败';
    }catch(err){l.textContent='请求失败';l.style.opacity='1';}
    mb.scrollTop=mb.scrollHeight;loadConversations();
  };

  // Init: load conversations, select latest (don't auto-create new one)
  (async function(){
    var res=await fetch('/api/conversations');var convos=await res.json();
    if(convos.length){await switchConversation(convos[0].id);}
    else{await loadConversations();}
  })();
})();
</script>
{% endblock %}
